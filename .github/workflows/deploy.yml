# =============================================================================
# Deploy — Build, Push, and Deploy to VPS (triggered by CI success)
# =============================================================================
# Runs ONLY after CI passes on main branch, via workflow_run trigger.
#
# Prerequisites (set in GitHub → Settings → Secrets and variables → Actions):
#   VPS_HOST       — VPS IP address or domain
#   VPS_USER       — SSH username (e.g., deploy)
#   VPS_SSH_KEY    — SSH private key (deploy key with repo read access)
#   VPS_PATH       — Path to project on VPS (e.g., /home/deploy/spesialis-platform)
#
# Repository Variables (Settings → Secrets and variables → Actions → Variables):
#   VPS_ENABLED    — Set to 'true' to enable auto-deploy
#
# Workflow:
#   1. Wait for CI to complete successfully
#   2. Build API + Web Docker images
#   3. Push to GitHub Container Registry (ghcr.io)
#   4. SSH into VPS → pull images → init SSL → migrate DB → restart stack
#
# Rollback:
#   ssh vps "cd $VPS_PATH && IMAGE_TAG=<previous-sha> IMAGE_OWNER=h4nzs docker compose -f docker-compose.prod.yml up -d"
# =============================================================================

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.10.0'
  IMAGE_REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ── Build & Push ──────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # needed to push to GHCR
    env:
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build API image ──────────────────────────────────────────
      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/api:latest
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/api:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # ── Build Web image ──────────────────────────────────────────
      - name: Build & Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/web:latest
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/web:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ── Deploy to VPS ─────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only deploy if VPS_ENABLED variable is set to 'true' in repo settings
    if: vars.VPS_ENABLED == 'true'
    env:
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
          EOF

      - name: Deploy to VPS
        run: |
          set -euo pipefail

          # Write deploy script to temp file to avoid heredoc escaping issues
          cat > /tmp/deploy-vps.sh << 'DEPLOYSCRIPT'
          set -euo pipefail
          cd ${{ secrets.VPS_PATH }}

          # Sync repository code (docker-compose, nginx config, etc.)
          echo "Syncing latest code from GitHub..."
          git fetch origin main
          git reset --hard origin/main
          git clean -fd -e .env.prod

          # Save previous deployment tag for rollback
          PREVIOUS_TAG=$(docker inspect ahlipanggilan-api --format '{{.Config.Image}}' 2>/dev/null | sed 's|.*:||' || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Previous deployment: $PREVIOUS_TAG"
          else
            echo "No previous deployment found (first deploy)"
          fi

          export IMAGE_TAG=${{ env.IMAGE_TAG }}
          export IMAGE_OWNER=${{ env.IMAGE_OWNER }}

          export COMPOSE_ENV_FILE="--env-file .env.prod"

          echo "Pulling images (ghcr.io/${IMAGE_OWNER}/api:${IMAGE_TAG})..."
          docker compose -f docker-compose.prod.yml $COMPOSE_ENV_FILE pull

          if [ ! -f /etc/letsencrypt/live/ahlipanggilan.id/fullchain.pem ]; then
            echo "SSL certs not found. Obtaining via certbot..."
            # Docker auto-creates bind mount dirs; deploy user is in docker group
            docker run --rm -p 80:80 \
              -v /etc/letsencrypt:/etc/letsencrypt \
              -v /var/www/letsencrypt:/var/www/letsencrypt \
              certbot/certbot certonly --standalone \
              -d ahlipanggilan.id -d www.ahlipanggilan.id \
              --non-interactive --agree-tos \
              --email admin@ahlipanggilan.id || \
              echo "SSL setup skipped -- will retry next deploy"
          else
            echo "SSL certs found, skipping..."
          fi

          echo "Starting database..."
          docker compose -f docker-compose.prod.yml $COMPOSE_ENV_FILE up -d postgres

          echo "Waiting for database to be healthy..."
          DB_READY=false
          for i in $(seq 1 20); do
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' ahlipanggilan-postgres 2>/dev/null || echo "missing")
            STATUS=$(docker inspect --format='{{.State.Status}}' ahlipanggilan-postgres 2>/dev/null || echo "missing")
            if [ "$HEALTH" = "healthy" ]; then
              echo "Database healthy!"
              DB_READY=true
              break
            fi
            echo "   Postgres: $STATUS / health: $HEALTH"
            sleep 3
          done

          # If database never became healthy, check logs & reset volume
          if [ "$DB_READY" = false ]; then
            STATUS=$(docker inspect --format='{{.State.Status}}' ahlipanggilan-postgres 2>/dev/null || echo "missing")
            echo "Postgres container status: $STATUS"
            echo "=== POSTGRES LOGS ==="
            docker logs ahlipanggilan-postgres --tail 50 2>/dev/null || echo "(no logs)"
            echo "======================"

            # Cek apakah volume berisi data sebelum reset
            VOL_HAS_DATA=false
            if docker volume inspect spesialis-platform_postgres_data >/dev/null 2>&1; then
              VOL_PATH=$(docker volume inspect spesialis-platform_postgres_data --format '{{.Mountpoint}}' 2>/dev/null || echo "")
              if [ -n "$VOL_PATH" ] && [ -d "$VOL_PATH" ] && [ "$(ls -A "$VOL_PATH" 2>/dev/null)" ]; then
                VOL_HAS_DATA=true
              fi
            fi

            if [ "$VOL_HAS_DATA" = true ]; then
              echo "WARNING: Database volume contains existing data — NOT resetting automatically"
              echo "Manual intervention required to fix postgres"
              echo "  SSH to VPS and run: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d postgres"
            else
              echo "Volume is empty or doesn't exist — safe to reset"
              docker compose -f docker-compose.prod.yml $COMPOSE_ENV_FILE down
              docker volume rm spesialis-platform_postgres_data 2>/dev/null || true

              echo "Restarting database with clean volume..."
              docker compose -f docker-compose.prod.yml $COMPOSE_ENV_FILE up -d postgres
            fi

            for i in $(seq 1 20); do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' ahlipanggilan-postgres 2>/dev/null || echo "missing")
              STATUS=$(docker inspect --format='{{.State.Status}}' ahlipanggilan-postgres 2>/dev/null || echo "missing")
              if [ "$HEALTH" = "healthy" ]; then
                echo "Database healthy after reset!"
                DB_READY=true
                break
              fi
              if [ "$STATUS" = "exited" ] || [ "$STATUS" = "missing" ]; then
                echo "Postgres exited after reset — dumping logs"
                docker logs ahlipanggilan-postgres --tail 30 2>/dev/null || true
                break
              fi
              echo "   Postgres: $STATUS / health: $HEALTH"
              sleep 3
            done

            if [ "$DB_READY" = false ]; then
              echo "=== POSTGRES LOGS (final) ==="
              docker logs ahlipanggilan-postgres --tail 50 2>/dev/null || true
              echo "============================="
            fi
          fi

          if [ "$DB_READY" = true ]; then
            # Backup sebelum migration
            echo "Backing up database before migration..."
            BACKUP_DIR="${{ secrets.VPS_PATH }}/db-backups"
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/pre-migrate-$(date +%Y%m%d-%H%M%S).sql"
            docker compose -f docker-compose.prod.yml $COMPOSE_ENV_FILE exec -T postgres \
              pg_dump -U specialist specialist > "$BACKUP_FILE" && \
              echo "Backup saved: $BACKUP_FILE" || \
              echo "WARNING: Backup failed — continuing anyway"

            # Bersihkan backup lebih dari 7 hari
            find "$BACKUP_DIR" -name "*.sql" -mtime +7 -delete 2>/dev/null || true

            echo "Running database migrations..."
            docker compose -f docker-compose.prod.yml $COMPOSE_ENV_FILE run --rm api pnpm --filter @ahlipanggilan/database db:migrate
          else
            echo "WARNING: Database is not healthy — skipping migrations"
          fi

          ROLLBACK_OCCURRED=false

          echo "Starting full stack..."
          docker compose -f docker-compose.prod.yml $COMPOSE_ENV_FILE up -d

          # ── Health check & auto-rollback ──────────────────────────
          echo "Checking API health (waiting for startup)..."

          DEPLOY_SUCCESS=false
          for i in $(seq 1 10); do
            if curl -sf http://localhost:3000/api/v1/health >/dev/null 2>&1; then
              DEPLOY_SUCCESS=true
              break
            fi
            sleep 3
          done

          if [ "$DEPLOY_SUCCESS" = true ]; then
            echo "✅ API health check passed — deployment successful!"
          else
            echo "⚠️ API health check FAILED"
            echo "=== API LOGS ==="
            docker logs ahlipanggilan-api --tail 30 2>/dev/null || echo "(no logs)"
            echo "================"
          fi

          if [ "$DEPLOY_SUCCESS" = false ] && [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "$IMAGE_TAG" ]; then
            echo "↩ Rolling back to previous deployment: $PREVIOUS_TAG"
            export IMAGE_TAG=$PREVIOUS_TAG
            docker compose -f docker-compose.prod.yml $COMPOSE_ENV_FILE up -d

            ROLLBACK_OK=false
            for i in $(seq 1 10); do
              if curl -sf http://localhost:3000/api/v1/health >/dev/null 2>&1; then
                ROLLBACK_OK=true
                break
              fi
              sleep 3
            done

            if [ "$ROLLBACK_OK" = true ]; then
              echo "✅ Rollback successful — API is healthy with $PREVIOUS_TAG"
              echo "⚠️  NOTE: Database migrations have been applied and will NOT be undone."
              echo "   If the old code fails due to schema changes, restore the backup manually:"
              echo "   docker compose -f docker-compose.prod.yml \$COMPOSE_ENV_FILE exec -T postgres psql -U specialist specialist < db-backups/pre-migrate-<timestamp>.sql"
              ROLLBACK_OCCURRED=true
            else
              echo "❌ Rollback ALSO FAILED — manual intervention required"
              echo "   Previous tag: $PREVIOUS_TAG"
              echo "   Failed tag: ${{ env.IMAGE_TAG }}"
              echo "=== API LOGS (after rollback) ==="
              docker logs ahlipanggilan-api --tail 30 2>/dev/null || true
              echo "================================"
            fi
          elif [ "$DEPLOY_SUCCESS" = false ]; then
            echo "❌ New deployment failed and no previous version to roll back to"
            echo "   This appears to be the first deployment"
          fi

          # ── Cleanup ────────────────────────────────────────────────
          echo "Pruning old images (older than 24h)..."
          docker image prune -f --filter "until=24h"

          echo "=== Final container status ==="
          docker ps --format 'table {{.Names}}\t{{.Status}}'

          # Signal failure to GitHub Actions if rollback happened
          if [ "$ROLLBACK_OCCURRED" = true ]; then
            echo ""
            echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
            echo '  ROLLBACK OCCURRED - New deployment FAILED'
            echo '  The site is running the PREVIOUS version.'
            echo '  Check the deploy logs for details.'
            echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
            exit 1
          fi
          DEPLOYSCRIPT

          # Copy and execute the script on VPS
          scp /tmp/deploy-vps.sh vps:/tmp/deploy-vps.sh
          ssh vps "bash /tmp/deploy-vps.sh"

          # Cleanup
          rm /tmp/deploy-vps.sh
          ssh vps "rm /tmp/deploy-vps.sh" || true

      - name: Verify deployment
        run: |
          sleep 15
          echo "→ Checking API health..."
          curl -sSf "https://ahlipanggilan.id/api/v1/health" || \
            echo "⚠ Health check failed (may need a few more seconds)"

          echo "→ Checking Web..."
          curl -sSf "https://ahlipanggilan.id/" -o /dev/null -w "   HTTP %{http_code}\n" || \
            echo "⚠ Web check failed"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.summary.addHeading('Deploy Failed', 2);
            core.summary.addRaw('Check the [deploy workflow run](' +
              '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' +
              ') for details.');
            core.summary.write();
