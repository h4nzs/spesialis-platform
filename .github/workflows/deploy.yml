# =============================================================================
# Deploy — Build, Push, and Deploy to VPS
# =============================================================================
# Runs after CI passes on main branch pushes.
#
# Prerequisites (set in GitHub → Settings → Secrets and variables → Actions):
#   VPS_HOST       — VPS IP address or domain
#   VPS_USER       — SSH username (e.g., deploy)
#   VPS_SSH_KEY    — SSH private key (deploy key with repo read access)
#   VPS_PATH       — Path to project on VPS (e.g., /home/deploy/spesialis)
#
# Workflow:
#   1. Build API + Web Docker images
#   2. Push to GitHub Container Registry (ghcr.io)
#   3. SSH into VPS → pull images → restart stack
#
# Rollback:
#   ssh vps "cd $VPS_PATH && IMAGE_TAG=<previous-sha> docker compose -f docker-compose.prod.yml up -d"
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11.10.0'
  IMAGE_REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Build & Push ──────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build API image ──────────────────────────────────────────
      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/api:latest
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/api:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # ── Build Web image ──────────────────────────────────────────
      - name: Build & Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/web:latest
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/web:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web


  # ── Deploy to VPS ─────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only deploy if VPS_HOST variable is set (set in repo settings)
    if: vars.VPS_ENABLED == 'true'

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
          EOF

      - name: Pull images & restart stack
        run: |
          ssh vps "
            set -e
            cd ${{ secrets.VPS_PATH }}

            echo '→ Pulling latest images...'
            IMAGE_TAG=${{ env.IMAGE_TAG }} \
              docker compose -f docker-compose.prod.yml pull

            echo '→ Restarting stack...'
            IMAGE_TAG=${{ env.IMAGE_TAG }} \
              docker compose -f docker-compose.prod.yml up -d

            echo '→ Pruning old images...'
            docker image prune -f --filter "until=24h"

            echo '→ Checking health...'
            sleep 5
            docker ps --format 'table {{.Names}}\t{{.Status}}'
          "

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.summary.addHeading('Deploy Failed', 2);
            core.summary.addRaw('Check the [deploy workflow run](' +
              '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' +
              ') for details.');
            core.summary.write();
