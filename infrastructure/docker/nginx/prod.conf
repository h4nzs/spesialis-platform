# =============================================================================
# Specialist Platform — Production Nginx Configuration
# =============================================================================
# This config is designed for docker-compose.prod.yml. It includes:
#   - HTTP→HTTPS redirect with ACME challenge support
#   - HTTPS server with TLSv1.2/1.3, OCSP Stapling, HSTS
#   - Rate limiting, caching, gzip compression
#   - Structured JSON logging
#
# Prerequisites:
#   1. Set DOMAIN to your actual domain (e.g., ahlipanggilan.id)
#   2. Obtain SSL certs: certbot certonly --webroot -w /var/www/letsencrypt -d <DOMAIN>
#   3. Verify: docker compose -f docker-compose.prod.yml up -d nginx
#   4. Test HTTPS at https://<DOMAIN>
#   5. Then uncomment the HSTS line
# =============================================================================

# ── Rate Limiting Zones ─────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=200r/s;

# ── Cache Path ─────────────────────────────────────────────────────────
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m
                 max_size=1g inactive=1h use_temp_path=off;

# ── Upstreams ──────────────────────────────────────────────────────────
upstream web_backend {
    server web:4321 max_fails=3 fail_timeout=30s;
}

upstream api_backend {
    server api:3000 max_fails=3 fail_timeout=30s;
}

# ── Logging Format ─────────────────────────────────────────────────────
log_format json_combined escape=json
    '{'
    '"timestamp":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"request_method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_status":"$upstream_status",'
    '"upstream_response_time":"$upstream_response_time",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"http_host":"$http_host",'
    '"cache_status":"$upstream_cache_status"'
    '}';

access_log /var/log/nginx/access.log json_combined buffer=32k flush=5s;
error_log  /var/log/nginx/error.log warn;


# =============================================================================
# HTTP → HTTPS Redirect
# =============================================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    server_tokens off;

    # ACME challenge for Let's Encrypt renewal
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}


# =============================================================================
# HTTPS Server
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name ${DOMAIN} www.${DOMAIN};

    # ── SSL ──────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── HSTS — UNCOMMENT ONLY AFTER VERIFYING HTTPS WORKS ─────────
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Hardening ───────────────────────────────────────────────────
    server_tokens  off;
    merge_slashes  off;

    # ── Request Limits ──────────────────────────────────────────────
    client_max_body_size        50m;
    client_body_buffer_size     128k;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    # ── Timeouts ────────────────────────────────────────────────────
    client_body_timeout   30s;
    client_header_timeout 30s;
    keepalive_timeout     65s;
    send_timeout          30s;

    # ── Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ═════════════════════════════════════════════════════════════════
    # Static Assets (fingerprinted — _astro/*.hash.ext)
    # ═════════════════════════════════════════════════════════════════
    location /_astro/ {
        limit_req zone=static burst=100 nodelay;

        proxy_pass http://web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header Set-Cookie;
        proxy_redirect off;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 365d;
        access_log off;
    }

    # ═════════════════════════════════════════════════════════════════
    # User-Uploaded Media
    # ═════════════════════════════════════════════════════════════════
    location /api/v1/media/ {
        limit_req zone=static burst=50 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        add_header Cache-Control "public, max-age=604800, must-revalidate" always;
        expires 7d;
    }

    # ═════════════════════════════════════════════════════════════════
    # Admin API — no caching (authenticated requests must always be fresh)
    # Must come BEFORE /api/ so nginx uses the more specific prefix match.
    # ═════════════════════════════════════════════════════════════════
    location /api/v1/admin/ {
        limit_req zone=api burst=150 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ═════════════════════════════════════════════════════════════════
    # Public API — cached 10s for GET
    # ═════════════════════════════════════════════════════════════════
    location /api/ {
        limit_req zone=api burst=150 nodelay;

        proxy_cache api_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 301 302 10s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_no_cache $http_authorization;
        proxy_cache_bypass $http_authorization;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        add_header X-Cache-Status $upstream_cache_status;
    }

    # ═════════════════════════════════════════════════════════════════
    # Astro SSR (all other traffic)
    # ═════════════════════════════════════════════════════════════════
    location / {
        limit_req zone=general burst=50 nodelay;

        # Astro's Node adapter doesn't handle HEAD natively — convert to GET
        proxy_method GET;

        proxy_pass http://web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
