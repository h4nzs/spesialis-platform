# =============================================================================
# Specialist Platform — Production-Grade Nginx Configuration
# =============================================================================
# This config powers both development (port 80, no SSL) and production
# (SSL-enabled, HTTP/2) environments. Uncomment the SSL server block and
# set server_name for production deployments.
#
# Security headers (CSP, X-Frame-Options, etc.) are handled by the
# applications themselves — Hono API uses secureHeaders() middleware,
# Astro handles its own. Nginx adds HSTS only in the SSL block.
# =============================================================================

# ── Rate Limiting Zones ─────────────────────────────────────────────────
# Each zone is a shared memory pool keyed by client IP. Per-location
# limit_req directives below reference these zones.
#
# Zone sizes: each entry ~64 bytes, 10m ≈ 160,000 unique IPs.
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=200r/s;

# ── Cache Path ─────────────────────────────────────────────────────────
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m
                 max_size=1g inactive=1h use_temp_path=off;

# ── Upstreams ──────────────────────────────────────────────────────────
upstream web_backend {
    server web:4321 max_fails=3 fail_timeout=30s;
}

upstream api_backend {
    server api:3000 max_fails=3 fail_timeout=30s;
}

# ── Logging Format ─────────────────────────────────────────────────────
# Structured JSON for machine parsing. Includes timing, cache status,
# and upstream metadata.
log_format json_combined escape=json
    '{'
    '"timestamp":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"request_method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_status":"$upstream_status",'
    '"upstream_response_time":"$upstream_response_time",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"http_host":"$http_host",'
    '"cache_status":"$upstream_cache_status"'
    '}';

access_log /var/log/nginx/access.log json_combined buffer=32k flush=5s;
error_log  /var/log/nginx/error.log warn;


# =============================================================================
# Main HTTP Server Block
# =============================================================================
# In development this serves directly. In production, uncomment the
# SSL block below and replace this with an HTTP→HTTPS redirect block.
# =============================================================================

server {

    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Hardening ───────────────────────────────────────────────────
    server_tokens  off;
    merge_slashes  off;   # Preserve // in paths for routes that use them

    # ── Request Limits ──────────────────────────────────────────────
    client_max_body_size        50m;
    client_body_buffer_size     128k;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    # ── Timeouts ────────────────────────────────────────────────────
    client_body_timeout   30s;
    client_header_timeout 30s;
    keepalive_timeout     65s;
    send_timeout          30s;

    # ── Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ═════════════════════════════════════════════════════════════════
    # Static Assets — fingerprinted files (_astro/*.hash.ext)
    # Immutable — cache 1 year, no revalidation needed.
    # ═════════════════════════════════════════════════════════════════
    location /_astro/ {
        limit_req zone=static burst=100 nodelay;

        proxy_pass http://web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header Set-Cookie;
        proxy_redirect off;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 365d;
        access_log off;  # Asset requests are too noisy to log
    }

    # ═════════════════════════════════════════════════════════════════
    # User-Uploaded Media — served via API, cache 7 days
    # ═════════════════════════════════════════════════════════════════
    location /api/v1/media/ {
        limit_req zone=static burst=50 nodelay;

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        add_header Cache-Control "public, max-age=604800, must-revalidate" always;
        expires 7d;
    }

    # ═════════════════════════════════════════════════════════════════
    # API — all /api/ traffic routed to Hono
    # GET responses cached for 10s; authenticated requests bypass cache.
    # ═════════════════════════════════════════════════════════════════
    location /api/ {
        limit_req zone=api burst=150 nodelay;

        # Cache GET responses for 10s — short enough for freshness,
        # long enough to absorb traffic spikes.
        proxy_cache api_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 301 302 10s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_no_cache $http_authorization;   # Don't store auth'd responses
        proxy_cache_bypass $http_authorization; # Don't serve stale auth'd

        # API serves routes at /api/v1/* — pass through as-is
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Original-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        add_header X-Cache-Status $upstream_cache_status;
    }

    # ═════════════════════════════════════════════════════════════════
    # Astro SSR — all other traffic
    # ═════════════════════════════════════════════════════════════════
    location / {
        limit_req zone=general burst=50 nodelay;

        # Astro's Node adapter doesn't handle HEAD natively (prematurely
        # closes connection → Nginx returns 502). Convert all methods
        # to GET when talking to the upstream; Nginx strips the body
        # for HEAD responses. This is safe because all data-mutating
        # operations (POST/PUT/DELETE) go through the /api/ location.
        proxy_method GET;

        proxy_pass http://web_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

}


